<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
  <title id="title">VORQ Digital logo</title>
  <desc id="desc">Unified logo for VORQ Digital, business name of Haitham Kojar.</desc>
  <defs>
    <linearGradient id="markGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2342"/>
      <stop offset="52%" stop-color="#123A63"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0A2342" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="900" height="220" fill="#FFFFFF"/>

  <g transform="translate(42 34)" filter="url(#softShadow)">
    <rect x="0" y="0" width="152" height="152" rx="34" fill="url(#markGradient)"/>
    <path d="M36 46 L65 110 C68 117 75 117 78 110 L116 42" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M105 105 L123 123" fill="none" stroke="#D4AF37" stroke-width="13" stroke-linecap="round"/>
    <circle cx="104" cy="86" r="25" fill="none" stroke="#FFFFFF" stroke-width="12"/>
  </g>

  <g transform="translate(226 54)">
    <text x="0" y="58" font-family="Inter, Arial, Helvetica, sans-serif" font-size="54" font-weight="800" letter-spacing="1.5" fill="#0A2342">VORQ</text>
    <text x="182" y="58" font-family="Inter, Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="0.2" fill="#0F766E">Digital</text>
    <rect x="0" y="80" width="382" height="4" rx="2" fill="url(#accentGradient)"/>
    <text x="0" y="118" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="600" letter-spacing="0.8" fill="#475569">WEB • IT • DIGITAL PROJECTS</text>
  </g>
</svg>
